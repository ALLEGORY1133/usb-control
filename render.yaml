services:
  - type: web
    name: usb-control
    runtime: python
    region: oregon
    buildCommand: pip install -r requirements.txt && python manage.py collectstatic --noinput
    startCommand: python manage.py migrate --noinput && python -c "import django,os; os.environ.setdefault('DJANGO_SETTINGS_MODULE','core.settings'); django.setup(); from django.contrib.auth.models import User; u,_=User.objects.get_or_create(username=os.environ.get('DJANGO_SUPERUSER_USERNAME','admin')); u.set_password(os.environ.get('DJANGO_SUPERUSER_PASSWORD','Admin1234!')); u.is_superuser=True; u.is_staff=True; u.save(); print('Superuser OK:', u.username)" && gunicorn core.wsgi:application
    plan: free
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: DATABASE_URL
        fromDatabase:
          name: usb-control-db
          property: connectionString

databases:
  - name: usb-control-db
    plan: free
    region: oregon
