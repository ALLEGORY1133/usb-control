app = 'usb-control'
primary_region = 'fra'

[build]

[deploy]
  release_command = "python manage.py migrate --noinput && python manage.py collectstatic --noinput"

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1

[[vm]]
  memory = '256mb'
  cpu_kind = 'shared'
  cpus = 1
